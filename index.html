<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itsuki Mainframe • Ledger Aureo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dual-bg"></div>

    <div class="main-wrapper">
        <header class="app-header">
            <div class="avatar-container" id="easterAvatar">
                <div class="status-led"></div>
                <img src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Itsuki&backgroundColor=ffb7c5" alt="Itsuki">
            </div>
            <h1 class="title">❧ Itsuki Mainframe</h1>
            <p class="subtitle">v11.0 "Bello e Ben Fatto" • Corpus Iuris</p>
            
            <nav class="nav-buttons">
                <button class="hamburger" id="menuToggle">☰ MENÚ</button>
                <div class="buttons-container" id="buttonsRow">
                    <button class="btn pink" data-action="dictamen">💖 DICTAMEN</button>
                    <button class="btn blue" data-action="auditoria">🌸 AUDITORÍA</button>
                    <button class="btn purple" data-action="status">🍭 STATUS</button>
                    <button class="btn dark" data-action="hablar">🤖 HABLAR</button>
                    <button class="btn spqr" data-action="spqr">⚖️ SPQR</button>
                </div>
            </nav>
        </header>

        <main class="ledger-box">
            <div class="ascii-edge">
                <span>╭─ ⟪ OUTPUT ⟫</span>
                <div class="ascii-line"></div>
                <span>╮</span>
            </div>
            
            <div id="output" class="ledger-content"><span>⟐ ESCANEANDO ENTE BIOLÓGICO... ⟐</span></div>
            
            <div class="ascii-edge">
                <span>╰</span>
                <div class="ascii-line"></div>
                <span>╯</span>
            </div>
        </main>

        <footer class="app-footer">
            <div class="icons">
                <span>🦁</span><span>🇦🇷</span><span>🇧🇷</span><span>⚖️</span>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
