<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Itsuki Mainframe • Ledger Aureo</title>
    <!-- Fuentes: Serif italiana + Mono técnico -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dual-bg"></div>

    <!-- HEADER STICKY con menú hamburguesa -->
    <header class="sticky-header">
        <div class="header-container">
            <div class="logo-area" id="easterAvatar">
                <div class="avatar-mini">
                    <img src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Itsuki&backgroundColor=ffb7c5" alt="Itsuki">
                    <span class="status-led-mini"></span>
                </div>
                <h1 class="serif-title">Itsuki Mainframe</h1>
            </div>

            <!-- Botón hamburguesa (solo móvil) -->
            <button class="menu-toggle" id="menuToggle" aria-label="Menú">☰</button>

            <!-- Menú de escritorio -->
            <nav class="desktop-nav">
                <button class="btn-nav" data-action="dictamen">💖 DICTAMEN</button>
                <button class="btn-nav" data-action="auditoria">🌸 AUDITORÍA</button>
                <button class="btn-nav" data-action="status">🍭 STATUS</button>
                <button class="btn-nav" data-action="spqr">⚖️ SPQR</button>
                <button class="btn-nav btn-telegram" data-action="hablar">🤖 HABLAR</button>
            </nav>

            <!-- Menú móvil (overlay, no desplaza contenido) -->
            <div class="mobile-menu" id="mobileMenu">
                <button class="btn-mobile" data-action="dictamen">💖 DICTAMEN</button>
                <button class="btn-mobile" data-action="auditoria">🌸 AUDITORÍA</button>
                <button class="btn-mobile" data-action="status">🍭 STATUS</button>
                <button class="btn-mobile" data-action="spqr">⚖️ SPQR</button>
                <button class="btn-mobile btn-telegram" data-action="hablar">🤖 HABLAR</button>
            </div>
        </div>
    </header>

    <!-- MAIN: Contenido central (ledger) -->
    <main class="main-ledger">
        <div class="ledger-card">
            <div class="ledger-border-top">
                <span>╭─ ⟪ OUTPUT ⟫</span>
                <div class="ledger-line"></div>
                <span>╮</span>
            </div>
            <div id="output" class="output-mono">
                ⟐ ESCANEANDO ENTE BIOLÓGICO... ⟐
            </div>
            <div class="ledger-border-bottom">
                <span>╰</span>
                <div class="ledger-line"></div>
                <span>╯</span>
            </div>
        </div>
    </main>

    <!-- FOOTER: cultural hints y derechos -->
    <footer class="footer-ledger">
        <div class="cultural-hints">
            <span class="tooltip" data-tip="¡Hakuna Matata!">🦁</span>
            <span class="tooltip" data-tip="Teen Titans Go!">🦹</span>
            <span class="tooltip" data-tip="Bender dice: 'Chupame la pieza'">🤖</span>
            <span class="tooltip" data-tip="Los Simpson: 'Ay, caramba!'">🍩</span>
            <span class="tooltip" data-tip="Tan Biónica - 'La melodía de Dios'">🎸</span>
            <span class="tooltip" data-tip="Argentina ★">🇦🇷</span>
            <span class="tooltip" data-tip="Brasil ★ Capoeira">🇧🇷</span>
        </div>
        <div class="legal-quote">Dura lex, sed lex — <em>Itsuki Auditora</em> | v11.0 "Aurea"</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
